{{- range .Values.sites }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-{{ .name }}
  labels:
    app: {{ .name }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
      - name: apache-container
        image: httpd:2.4
        ports:
        - containerPort: 80
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "<html><body style='background-color: {{ .color }}; text-align: center; color: white; font-family: sans-serif; padding-top: 100px;'><h1>{{ .title }}</h1><p>{{ .description }}</p></body></html>" > /usr/local/apache2/htdocs/index.html
          httpd-foreground
---
{{- end }}