controller:
  admin:
    username: admin
    password: admin
  serviceType: LoadBalancer
  installPlugins:
    - configuration-as-code:latest
    - git:latest
    - kubernetes:latest
    - workflow-aggregator:latest
    - credentials-binding:latest
    - job-dsl:latest

  containerEnv:
    - name: GITHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: github-username
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-secrets
          key: github-token

  JCasC:
    configScripts:
      setup: |
        credentials:
          system:
            domainCredentials:
            - credentials:
              - usernamePassword:
                  scope: GLOBAL
                  id: "github-token"
                  username: "${GITHUB_USERNAME}"
                  password: "${GITHUB_TOKEN}"
                  description: "GitHub PAT"
              - imageRegistryCredentials:
                  scope: GLOBAL
                  id: "dockerhub-creds"
                  description: "DockerHub Credentials from k8s secret"
          jenkins:
          kubernetesCredentialsProvider:
            enabled: true
      my-jobs: |
        jobs:
          - script: >
              pipelineJob('my-test-pipeline') {
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/chmelvv/simple_site_for_k8s_practice.git')
                          credentials('github-token')
                        }
                        branch('main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }

persistence:
  enabled: true
  storageClass: "gp2" 
  size: "8Gi"